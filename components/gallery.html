<!-- ================= GALLERY COMPONENT ================= -->
<section id="gallerySection"
class="hidden py-24 bg-[#f8f5f4]">

    <div class="max-w-7xl mx-auto px-6">

        <!-- Section Header -->
        <div class="text-center mb-16">

            <span id="galleryBadge"
            class="inline-block
                   px-5 py-2
                   rounded-full
                   bg-blue-100
                   text-blue-700
                   text-sm
                   font-semibold
                   tracking-[3px]
                   uppercase">

                Gallery

            </span>

            <h2 id="galleryTitle"
            class="text-4xl md:text-5xl font-bold mt-6">

                Explore Our Gallery

            </h2>

            <p id="gallerySubtitle"
            class="mt-5
                   max-w-3xl
                   mx-auto
                   text-gray-600
                   leading-8">

                Beautiful moments captured during our unforgettable experiences.

            </p>

        </div>

        <!-- Featured Image -->
        <div id="galleryHeroCard"
        class="relative
               rounded-[35px]
               overflow-hidden
               shadow-2xl
               mb-16
               group">

            <img id="galleryHeroImage"
            src=""
            class="w-full
                   h-[500px]
                   object-cover
                   duration-700
                   group-hover:scale-105">

            <div class="absolute inset-0 bg-gradient-to-t
                        from-black/80
                        via-black/20
                        to-transparent">
            </div>

            <div class="absolute bottom-0 left-0 p-10 text-white">

                <p id="galleryHeroCategory"
                class="uppercase
                       tracking-[4px]
                       text-cyan-200
                       text-sm">

                </p>

                <h3 id="galleryHeroTitle"
                class="text-4xl font-bold mt-2">

                                </h3>

                <p id="galleryHeroDescription"
                class="mt-4
                       max-w-2xl
                       text-gray-200
                       leading-7">

                    Discover unforgettable memories with Tours Mirissa.

                </p>

                <div class="mt-8 flex flex-wrap gap-4">

                    <div class="bg-white/15
                                backdrop-blur-md
                                px-5
                                py-3
                                rounded-xl">

                        📸
                        <span id="galleryImageCount">
                            0 Photos
                        </span>

                    </div>

                    <div class="bg-white/15
                                backdrop-blur-md
                                px-5
                                py-3
                                rounded-xl">

                        ⭐ Premium Experience

                    </div>

                </div>

            </div>

        </div>

        <!-- Gallery Grid -->
        <div id="galleryGrid"
        class="grid
               sm:grid-cols-2
               lg:grid-cols-3
               xl:grid-cols-4
               gap-8">

            <!-- Cards inserted by gallery.js -->

        </div>

        <!-- Show More Button -->
        <div class="text-center mt-16">

            <button id="showMoreBtn"
            class="hidden
                   bg-yellow-400
                   hover:bg-yellow-300
                   text-black
                   font-semibold
                   px-10
                   py-4
                   rounded-full
                   transition">

                Show More Photos

            </button>

        </div>

    </div>

</section>

<!-- ================= LIGHTBOX ================= -->

<div id="lightbox"
class="fixed
       inset-0
       bg-black/95
       z-[9999]
       hidden
       items-center
       justify-center
       p-6">

    <!-- Close -->
    <button id="closeLightbox"
    class="absolute
           top-8
           right-8
           text-white
           text-5xl
           hover:text-yellow-400">

        &times;

    </button>

    <!-- Previous -->

    <button id="prevImage"
    class="absolute
           left-6
           text-white
           text-5xl
           hover:text-yellow-400">

        &#10094;

    </button>

    <!-- Main Image -->

    <div class="max-w-6xl w-full">

        <img id="lightboxImage"
        src=""
        class="w-full
               max-h-[80vh]
               object-contain
               rounded-3xl
               shadow-2xl">

        <div class="text-center text-white mt-8">

            <h3 id="lightboxTitle"
            class="text-3xl font-bold">

            </h3>

            <p id="lightboxDescription"
            class="mt-3
                   text-gray-300
                   max-w-3xl
                   mx-auto">

            </p>

            <p id="lightboxCounter"
            class="mt-5
                   text-yellow-400
                   font-semibold">

                1 / 1

            </p>

        </div>

    </div>

    <!-- Next -->

    <button id="nextImage"
    class="absolute
           right-6
           text-white
           text-5xl
           hover:text-yellow-400">

        &#10095;

    </button>

</div>
